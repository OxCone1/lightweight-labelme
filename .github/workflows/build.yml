name: Build EXE and Upload to HEAT-Sentinel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller labelme.spec

      - name: Upload EXE to HEAT-Sentinel release
        env:
          GH_TOKEN: ${{ secrets.HEAT_SENTINEL_TOKEN }}
        run: |
          $tag = "0.1.0"
          gh release create $tag --repo "OxCone1/HEAT-Sentinel" `
            --title $tag --notes "Auto-built from commit $env:GITHUB_SHA" 2> $null
          gh release upload $tag "dist/labelme.exe#labelme.exe" `
            --clobber --repo "OxCone1/HEAT-Sentinel"
