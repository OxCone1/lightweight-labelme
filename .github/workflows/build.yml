name: Build EXE and Upload to HEAT-Sentinel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller labelme.spec

      - name: Compute SHA256
        shell: pwsh
        run: |
          $sha256 = (Get-FileHash -Algorithm SHA256 dist/labelme.exe).Hash.ToLower()
          echo "sha256=$sha256" >> $env:GITHUB_ENV

      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: ./dist/labelme.exe

      - name: Upload to current repo (latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VT_ANALYSIS: ${{ steps.vt.outputs.analysis }}
        shell: pwsh
        run: |
          $vtLink = $env:VT_ANALYSIS
          if ($vtLink) { $vtLink = ($vtLink -split '=')[-1] } else { $vtLink = "https://www.virustotal.com/gui/file/$env:sha256/detection" }

          $notes = @"
          SHA256: $env:sha256

          VirusTotal: $vtLink
          "@
          $tag = "latest"
          gh release create $tag --title "Latest Build" --notes $notes 2> $null
          gh release upload $tag "dist/labelme.exe#labelme.exe" --clobber
          gh release edit $tag --notes $notes

      - name: Upload to HEAT-Sentinel (0.1.0)
        env:
          GH_TOKEN: ${{ secrets.HEAT_SENTINEL_TOKEN }}
          VT_ANALYSIS: ${{ steps.vt.outputs.analysis }}
        shell: pwsh
        run: |
          $vtLink = $env:VT_ANALYSIS
          if ($vtLink) { $vtLink = ($vtLink -split '=')[-1] } else { $vtLink = "https://www.virustotal.com/gui/file/$env:sha256/detection" }

          $notes = @"
          SHA256: $env:sha256

          VirusTotal: $vtLink
          "@
          $tag = "0.1.0"
          gh release create $tag --repo "OxCone1/HEAT-Sentinel" --title $tag --notes $notes 2> $null
          gh release upload $tag "dist/labelme.exe#labelme.exe" --clobber --repo "OxCone1/HEAT-Sentinel"
          gh release edit $tag --repo "OxCone1/HEAT-Sentinel" --notes $notes
